<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵山胜境 · 管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.5 "Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333}
header{background:linear-gradient(135deg,#1a3a2a,#2d5a3f);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:500}
nav{display:flex;gap:4px}
nav button{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;background:rgba(255,255,255,.15);color:#fff;transition:.2s}
nav button:hover,nav button.active{background:rgba(255,255,255,.3)}
main{max-width:1300px;margin:20px auto;padding:0 16px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:16px;margin-bottom:14px;color:#1a3a2a}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat{padding:16px;background:#f8faf8;border-radius:8px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#2d5a3f}
.stat .label{font-size:12px;color:#888;margin-top:4px}
.chart{width:100%;height:300px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.row{grid-template-columns:1fr}}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#2d5a3f;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-outline{border:1px solid #2d5a3f;color:#2d5a3f;background:none}
.btn-sm{padding:4px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
th{color:#888;font-weight:500}
input,select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:200px}
input[type=file]{width:auto}
.gap-4{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.mt-3{margin-top:12px}
.tag{padding:2px 8px;border-radius:4px;font-size:11px}
.tag-green{background:#e6f7e6;color:#2d5a3f}
.tag-blue{background:#e6f0fa;color:#2d5a8f}
.tag-yellow{background:#fef7e6;color:#8f6d2d}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-ok{background:#2d5a3f}
.toast-err{background:#e74c3c}
/* 形象管理 — 两栏布局 */
.avatar-row{display:flex;gap:16px;min-height:600px}
.avatar-left{flex:1;min-width:0}
.avatar-right{width:450px;flex-shrink:0}

.avatar-video-box{background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;aspect-ratio:1/1}

.avatar-video-box video{width:100%;height:100%;object-fit:cover;background:#000;display:block}
.avatar-video-box .ctrl{background:#1a1a1a;padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13px}
.avatar-video-box .ctrl button,.avatar-video-box .ctrl input{font-size:12px}
.avatar-video-box .ctrl button{padding:4px 12px;border:1px solid #555;background:0 0;color:#ccc;border-radius:4px;cursor:pointer}
.avatar-video-box .ctrl button:hover{border-color:#2d5a3f;color:#fff}
.avatar-video-box .ctrl input{background:#333;color:#fff;border:1px solid #555;border-radius:4px;padding:4px 8px;width:auto}
.status-badge{font-size:11px;padding:2px 8px;border-radius:10px}
.status-badge.on{background:#1b5e20;color:#a5d6a7}
.status-badge.off{background:#b71c1c;color:#ef9a9a}
.avatar-video-box{position:relative}
.avatar-loading{position:absolute;top:0;left:0;right:0;bottom:36px;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#fff;border-radius:10px 10px 0 0}
.avatar-loading .sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#2d5a3f;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar-loading .lt{font-size:14px;margin:12px 0 8px;color:#ccc}
.avatar-loading .lb{width:60%;max-width:200px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.avatar-loading .lf{height:100%;width:0%;background:#2d5a3f;border-radius:3px;transition:width .3s}
@media(max-width:900px){.avatar-row{flex-direction:column}.avatar-right{width:100%}.avatar-video-box video{height:300px}}
</style>
</head>
<body>
<header>
  <h1>🏯 灵山胜境 · 智慧导览管理后台</h1>
  <nav>
    <button class="active" onclick="switchPage('dashboard',this)">数据大屏</button>
    <button onclick="switchPage('knowledge',this)">知识库</button>
    <button onclick="switchPage('avatar',this)">形象管理</button>
    <button onclick="switchPage('report',this)">游客报告</button>
  </nav>
</header>
<main>
  <div id="page-dashboard" class="page active">
    <div class="stats" id="stats"></div>
    <div class="row">
      <div class="card"><h3>热门问答 TOP8</h3><div class="chart" id="chart-hot"></div></div>
      <div class="card"><h3>服务人次趋势（近7天）</h3><div class="chart" id="chart-trend"></div></div>
    </div>
    <div class="row" style="margin-top:16px">
      <div class="card"><h3>时段分布（近7天）</h3><div class="chart" id="chart-hourly"></div></div>
      <div class="card"><h3>关注主题分布</h3><div class="chart" id="chart-topic"></div></div>
    </div>
  </div>

  <div id="page-knowledge" class="page">
    <div class="card"><h3>上传文档</h3><div class="gap-4"><input id="kb-title" placeholder="文档标题"><input type="file" id="kb-file" accept=".docx,.txt,.pdf"><button class="btn btn-primary" onclick="uploadDoc()">上传</button><button class="btn btn-outline" onclick="reindex()">重新入库</button></div></div>
    <div class="card"><h3>已有文档</h3><table id="kb-table"><thead><tr><th>ID</th><th>标题</th><th>路径</th><th>状态</th></tr></thead><tbody></tbody></table></div>
  </div>

  <!-- ======== 形象管理（左右两栏） ======== -->
  <div id="page-avatar" class="page">
    <div class="avatar-row">
      <!-- 左栏：视频 -->
      <div class="avatar-left">
        <div class="avatar-video-box">
          <video id="av-video" autoplay playsinline muted></video>
          <audio id="av-audio" autoplay></audio>
          <div class="avatar-loading" id="av-loading">
            <div class="sp"></div>
            <div class="lt">正在切换角色...</div>
            <div class="lb"><div class="lf" id="av-loading-bar"></div></div>
          </div>
          <div class="ctrl">
            <input id="av-avatar" value="wav2lip256_avatar1" style="width:120px" title="Avatar ID">
            <input id="av-refaudio" value="zh-CN-XiaoxiaoNeural" style="width:140px" title="参考音频">
            <button onclick="avConnect()">▶ 连接</button>
            <button onclick="avDisconnect()">⏹ 断开</button>
            <span id="av-status" class="status-badge off">未连接</span>
            <span style="color:#888;font-size:11px" id="av-sid"></span>
          </div>
        </div>
        <!-- 音色 + 激活 -->
        <div class="card"><h3>🎤 音色切换</h3><div class="gap-4" id="voice-list"></div></div>
        <div class="card"><h3>当前激活</h3><div id="active-avatar"></div></div>
      </div>

      <!-- 右栏：控制面板 -->
      <div class="avatar-right">
        <div class="card"><h3>✏️ 文本驱动</h3>
          <textarea id="av-text" rows="3" style="width:100%;resize:vertical;font-size:12px;padding:6px" placeholder="输入文本让数字人播报...">你好，欢迎来到灵山胜境</textarea>
          <div class="gap-4 mt-3">
            <select id="av-type" style="width:100px"><option value="echo">Echo 复读</option><option value="chat">Chat LLM</option></select>
            <button class="btn btn-primary btn-sm" onclick="avSendText()">发送</button>
            <button class="btn btn-danger btn-sm" onclick="avInterrupt()">打断</button>
          </div>
        </div>
        <div class="card"><h3>🎵 音频驱动</h3>
          <input type="file" id="av-audiofile" accept="audio/*" style="width:100%;margin-bottom:8px">
          <button class="btn btn-primary btn-sm" onclick="avUploadAudio()">上传并播放</button>
        </div>
        <div class="card"><h3>⏺ 录制控制</h3>
          <div class="gap-4">
            <button class="btn btn-outline btn-sm" id="av-rec-btn" onclick="avToggleRecord()">开始录制</button>
            <button class="btn btn-outline btn-sm" id="av-dl-btn" onclick="avDownloadRecord()" disabled>下载录像</button>
          </div>
        </div>
        <div class="card"><h3>🎭 动作编排</h3>
          <div class="gap-4">
            <input type="number" id="av-audiotype" value="2" min="2" style="width:70px">
            <button class="btn btn-primary btn-sm" onclick="avSetAudiotype()">切换状态</button>
          </div>
        </div>
        <div class="card"><h3>🔗 快捷入口</h3>
          <div class="gap-4">
            <a href="http://localhost:8010/avatar.html" target="_blank" class="btn btn-outline btn-sm">Avatar 生成</a>
            <a href="http://localhost:8010/admin.html" target="_blank" class="btn btn-outline btn-sm">LiveTalking 后台</a>
            <a href="http://localhost:8010/tts/index.html" target="_blank" class="btn btn-outline btn-sm">TTS 语音</a>
            <a href="http://localhost:8011/" target="_blank" class="btn btn-outline btn-sm">用户端首页</a>
          </div>
        </div>
        <div class="card"><h3>🔄 角色替换</h3>
          <div id="avatar-switch-list">
            <span style="color:#888;font-size:12px">加载中...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-report" class="page">
    <div class="card">
      <h3>游客感受度报告</h3>
      <div class="gap-4" style="margin-bottom:16px">
        <select id="report-days" onchange="loadReport()"><option value="7">近7天</option><option value="30">近30天</option><option value="90">近90天</option></select>
        <span id="report-summary" style="color:#888;font-size:13px"></span>
      </div>
      <div class="stats" id="report-stats"></div>
      <div class="row mt-3"><div class="chart" id="chart-sentiment"></div><div class="chart" id="chart-keywords"></div></div>
      <div class="row" style="margin-top:16px"><div class="chart" id="chart-report-hourly"></div><div class="chart" id="chart-report-topic"></div></div>
    </div>
    <div class="card"><h3>智能运营建议</h3><div id="suggestions"></div></div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
const ADMIN = '';
let charts = {};

function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'knowledge') loadDocs();
  if (name === 'avatar') { loadVoices(); loadDiskAvatars(); if (!avSid) avConnect(); }
  if (name === 'report') loadReport();
}

function toast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- Dashboard ----
async function loadDashboard() {
  var dash = await (await fetch(ADMIN + '/api/dashboard/overview')).json();
  var rep = await (await fetch(ADMIN + '/api/report/insights?days=7')).json();

  // 统计卡片
  var satPct = dash.satisfaction_trend && dash.satisfaction_trend.length
    ? Math.round(dash.satisfaction_trend[dash.satisfaction_trend.length-1].satisfaction * 100) : 0;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="num">'+dash.today_count+'</div><div class="label">今日服务人次</div></div>'+
    '<div class="stat"><div class="num">'+dash.week_count+'</div><div class="label">近7天服务人次</div></div>'+
    '<div class="stat"><div class="num">'+satPct+'%</div><div class="label">游客满意度</div></div>'+
    '<div class="stat"><div class="num">'+rep.avg_latency_sec+'s</div><div class="label">平均响应时间</div></div>';

  // 热门问答
  if (!charts.hot) charts.hot = echarts.init(document.getElementById('chart-hot'));
  var hq = dash.hot_questions.slice(0,8);
  charts.hot.setOption({tooltip:{},xAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}}},yAxis:{type:'category',data:hq.map(function(q){return q.question;}).reverse(),axisLabel:{width:110,overflow:'truncate',fontSize:11},axisLine:{show:false}},series:[{type:'bar',data:hq.map(function(q){return q.count;}).reverse(),barWidth:20,itemStyle:{borderRadius:[0,4,4,0],color:'#2d5a3f'}}],grid:{left:115,right:20,top:5,bottom:5}});

  // 服务趋势
  if (!charts.trend) charts.trend = echarts.init(document.getElementById('chart-trend'));
  var st = dash.satisfaction_trend;
  charts.trend.setOption({tooltip:{},legend:{data:['服务人次','满意度'],bottom:0},xAxis:{type:'category',data:st.map(function(s){return s.date;})},yAxis:[{type:'value',name:'人次'},{type:'value',name:'满意度',max:1,axisLabel:{formatter:function(v){return Math.round(v*100)+'%';}}}],series:[{name:'服务人次',type:'bar',data:st.map(function(s){return s.count;}),barWidth:22,itemStyle:{borderRadius:[4,4,0,0],color:'#2d5a3f'}},{name:'满意度',type:'line',yAxisIndex:1,data:st.map(function(s){return s.satisfaction;}),smooth:true,symbol:'circle',symbolSize:6,lineStyle:{color:'#e6a817',width:2.5},areaStyle:{color:'rgba(230,168,23,.15)'}}],grid:{left:50,right:50,top:20,bottom:40}});

  // 时段分布
  if (!charts.hourly) charts.hourly = echarts.init(document.getElementById('chart-hourly'));
  var hd = rep.hourly_distribution || [];
  charts.hourly.setOption({tooltip:{},xAxis:{type:'category',data:hd.map(function(h){return h.hour;}),axisLabel:{fontSize:10}},yAxis:{type:'value',name:'咨询量',splitLine:{lineStyle:{color:'#f5f5f5'}}},series:[{type:'bar',data:hd.map(function(h){return h.count;}),barWidth:'60%',itemStyle:{borderRadius:[4,4,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#5a8a6a'},{offset:1,color:'#a5c8a5'}])}}],grid:{left:45,right:15,top:15,bottom:30}});

  // 主题分布
  if (!charts.topic) charts.topic = echarts.init(document.getElementById('chart-topic'));
  var tp = rep.topic_breakdown || [];
  charts.topic.setOption({tooltip:{trigger:'item',formatter:'{b}: {c}次 ({d}%)'},series:[{type:'pie',radius:['40%','70%'],center:['50%','55%'],data:tp.map(function(t){return{name:t.topic,value:t.count};}),label:{fontSize:11,formatter:'{b}\n{d}%'},emphasis:{label:{fontSize:14}}}],grid:{}});
}

// ---- Knowledge ----
async function uploadDoc() {const t=document.getElementById('kb-title').value.trim(),f=document.getElementById('kb-file').files[0];if(!t||!f)return toast('请填写标题并选择文件',0);const fd=new FormData();fd.append('title',t);fd.append('file',f);await fetch(ADMIN+'/api/knowledge/upload',{method:'POST',body:fd});toast('上传成功',1);loadDocs();}
async function reindex() {await fetch(ADMIN+'/api/knowledge/reindex',{method:'POST'});toast('重新入库已触发',1);loadDocs();}
async function loadDocs() {const d=await(await fetch(ADMIN+'/api/knowledge/docs')).json();document.querySelector('#kb-table tbody').innerHTML=d.map(d=>'<tr><td>'+d.id+'</td><td>'+d.title+'</td><td>'+d.source_path+'</td><td><span class="tag tag-'+(d.status==='ingested'?'green':'yellow')+'">'+d.status+'</span></td></tr>').join('');}

// ---- Avatar LiveTalking ----
const AV='/lt';let avPc=null,avSid=null,avRecording=false;
function avSetStatus(on){const e=document.getElementById('av-status');e.className='status-badge '+(on?'on':'off');e.textContent=on?'已连接':'未连接';document.getElementById('av-sid').textContent=avSid?'SID:'+avSid.slice(0,8)+'...':'';}
let avConnecting=false,avSending=false,avVoice="zh-CN-XiaoxiaoNeural";
function avConnect(){if(avConnecting||avPc)return;avConnecting=true;avPc=new RTCPeerConnection({sdpSemantics:'unified-plan'});avPc.addTransceiver('video',{direction:'recvonly'});avPc.addTransceiver('audio',{direction:'recvonly'});avPc.addEventListener('track',evt=>{if(evt.track.kind==='video')document.getElementById('av-video').srcObject=evt.streams[0];else document.getElementById('av-audio').srcObject=evt.streams[0];});avPc.addEventListener('connectionstatechange',()=>{if(avPc.connectionState==='connected')avSetStatus(true);else if(avPc.connectionState==='disconnected'||avPc.connectionState==='failed')avSetStatus(false);});avPc.createOffer().then(o=>avPc.setLocalDescription(o)).then(()=>new Promise(r=>{if(avPc.iceGatheringState==='complete')r();else avPc.addEventListener('icegatheringstatechange',()=>{if(avPc.iceGatheringState==='complete')r();});})).then(()=>{return fetch(AV+'/offer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sdp:avPc.localDescription.sdp,type:avPc.localDescription.type,avatar:document.getElementById('av-avatar').value,refaudio:document.getElementById('av-refaudio').value})});}).then(r=>r.json()).then(a=>{if(!a.sdp)throw new Error('no sdp');avSid=a.sessionid||'';avSetStatus(true);avConnecting=false;return avPc.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:a.sdp}));}).catch(e=>{avConnecting=false;toast('连接失败: '+e.message,0);avDisconnect();});}
function avDisconnect(){if(avPc){avPc.close();avPc=null;}avConnecting=false;avSetStatus(false);avSid=null;document.getElementById('av-video').srcObject=null;document.getElementById('av-audio').srcObject=null;}
function avSendText(){if(!avSid)return toast('请先连接',0);if(avSending)return;const t=document.getElementById('av-text').value.trim();if(!t)return;avSending=true;document.getElementById('av-text').value='';toast('已发送',1);fetch(AV+'/human',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,type:document.getElementById('av-type').value,interrupt:true,sessionid:avSid,tts:{ref_file:avVoice}})}).then(r=>r.json()).then(d=>{avSending=false;}).catch(e=>{avSending=false;toast('发送失败',0);});}
function avInterrupt(){if(!avSid)return;fetch(AV+'/interrupt_talk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionid:avSid})}).then(r=>r.json()).then(d=>toast('已打断',1));}
function avUploadAudio(){const f=document.getElementById('av-audiofile').files[0];if(!f||!avSid)return toast('请先连接并选文件',0);const fd=new FormData();fd.append('file',f);fd.append('sessionid',avSid);fetch(AV+'/humanaudio',{method:'POST',body:fd}).then(r=>r.json()).then(d=>toast('已播放',1));}
function avToggleRecord(){if(!avSid)return toast('请先连接',0);const t=avRecording?'end_record':'start_record';fetch(AV+'/record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:t,sessionid:avSid})}).then(r=>r.json()).then(d=>{avRecording=!avRecording;const b=document.getElementById('av-rec-btn');b.textContent=avRecording?'停止录制':'开始录制';b.className=avRecording?'btn btn-danger btn-sm':'btn btn-outline btn-sm';document.getElementById('av-dl-btn').disabled=avRecording;});}
function avDownloadRecord(){if(!avSid)return;window.open(AV+'/record/'+avSid,'_blank');}
function avSetAudiotype(){if(!avSid)return toast('请先连接',0);fetch(AV+'/set_audiotype',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audiotype:parseInt(document.getElementById('av-audiotype').value)||0,sessionid:avSid})}).then(r=>r.json()).then(d=>toast('已切换',1));}
async function loadVoices(){const d=await(await fetch(ADMIN+'/api/avatar/voices')).json();document.getElementById('voice-list').innerHTML=d.voices.map(v=>'<button class="btn btn-outline btn-sm" onclick="setVoice(\''+v.id+'\')">'+v.name+'</button>').join('');loadActiveAvatar();}
async function setVoice(voice){const r=await(await fetch(ADMIN+'/api/avatar/activate-voice?voice='+encodeURIComponent(voice),{method:'POST'})).json();if(r.synced){avVoice=voice;document.getElementById("av-refaudio").value=voice;toast('音色已切换: '+r.name,1)}else toast('切换失败: '+(r.error||'未知错误'),0);loadActiveAvatar();}
async function loadActiveAvatar(){const a=await(await fetch(ADMIN+'/api/avatar/active')).json();document.getElementById('active-avatar').innerHTML='<span class="tag tag-green">当前: '+a.name+'</span> 音色: '+a.voice;}
async function loadDiskAvatars(){const d=await(await fetch(ADMIN+'/api/avatar/disk-avatars')).json();const c=document.getElementById('avatar-switch-list');if(!d.avatars||d.avatars.length===0){c.innerHTML='<span style="color:#888;font-size:12px">暂无可用形象</span>';return;}c.innerHTML='<table><thead><tr><th>角色ID</th><th>操作</th></tr></thead><tbody>'+d.avatars.map(a=>'<tr><td>'+a.id+'</td><td>'+(a.valid?'<button class="btn btn-primary btn-sm" onclick="switchAvatar(\''+a.id+'\')">使用</button>':'<span style="color:#999;font-size:12px">数据不完整</span>')+(a.id==='wav2lip256_avatar1'?'':' <button class="btn btn-danger btn-sm" onclick="deleteAvatar(\''+a.id+'\')">删除</button>')+'</td></tr>').join('')+'</tbody></table>';}
async function switchAvatar(id){const ov=document.getElementById('av-loading'),bar=document.getElementById('av-loading-bar');ov.style.display='flex';bar.style.width='20%';let p=20,tmr=setInterval(()=>{p=Math.min(p+(85-p)*.12,80);bar.style.width=Math.round(p)+'%'},300);const r=await(await fetch(ADMIN+'/api/avatar/switch-avatar?avatar_id='+encodeURIComponent(id),{method:'POST'})).json();if(!r.synced){clearInterval(tmr);ov.style.display='none';return toast('切换失败: '+(r.error||'未知错误'),0)}document.getElementById('av-avatar').value=id;avDisconnect();setTimeout(()=>{clearInterval(tmr);bar.style.width='90%';avConnect();const ci=setInterval(()=>{if(document.getElementById('av-status').classList.contains('on')){clearInterval(ci);bar.style.width='100%';setTimeout(()=>{ov.style.display='none';toast('已切换到: '+id,1)},300)}},500);setTimeout(()=>{clearInterval(ci);ov.style.display='none'},15000)},800);}
async function deleteAvatar(id){if(!confirm('确定要删除角色「'+id+'」吗？此操作不可恢复。'))return;const r=await(await fetch(ADMIN+'/api/avatar/delete-avatar?avatar_id='+encodeURIComponent(id),{method:'POST'})).json();if(r.deleted){toast('已删除: '+id,1);loadDiskAvatars();}else toast('删除失败: '+(r.error||'未知错误'),0);}

// ---- Report ----
async function loadReport(){
  var days=document.getElementById('report-days').value;
  var r=await(await fetch(ADMIN+'/api/report/insights?days='+days)).json();
  document.getElementById('report-summary').textContent='共 '+r.total_interactions+' 次交互 · 平均响应 '+r.avg_latency_sec+' 秒 · 热门问题 '+r.hot_questions.length+' 类';

  // 统计卡
  var pos=r.sentiment_trend.pos||0, neg=r.sentiment_trend.neg||0, neu=r.sentiment_trend.neutral||0;
  document.getElementById('report-stats').innerHTML=
    '<div class="stat"><div class="num" style="color:#4caf50">'+pos+'</div><div class="label">正面评价</div></div>'+
    '<div class="stat"><div class="num" style="color:#9e9e9e">'+neu+'</div><div class="label">中性评价</div></div>'+
    '<div class="stat"><div class="num" style="color:#ef5350">'+neg+'</div><div class="label">负面评价</div></div>'+
    '<div class="stat"><div class="num">'+r.total_interactions+'</div><div class="label">用户消息总数</div></div>';

  // 情感饼图
  if(!charts.sentiment)charts.sentiment=echarts.init(document.getElementById('chart-sentiment'));
  charts.sentiment.setOption({title:{text:'情感分布',left:'center',textStyle:{fontSize:14}},tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},series:[{type:'pie',radius:['45%','70%'],center:['50%','55%'],data:[{name:'正面',value:pos,itemStyle:{color:'#4caf50'}},{name:'中性',value:neu,itemStyle:{color:'#9e9e9e'}},{name:'负面',value:neg,itemStyle:{color:'#ef5350'}}],label:{formatter:'{b}\n{d}%',fontSize:12}}]});

  // 关键词柱状图（jieba分词结果）
  if(!charts.keywords)charts.keywords=echarts.init(document.getElementById('chart-keywords'));
  var kw=(r.top_keywords||[]).slice(0,12);
  charts.keywords.setOption({title:{text:'热门关键词（分词提取）',left:'center',textStyle:{fontSize:14}},tooltip:{},xAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}}},yAxis:{type:'category',data:kw.map(function(k){return k.word;}).reverse(),axisLabel:{fontSize:11},axisLine:{show:false}},series:[{type:'bar',data:kw.map(function(k){return k.count;}).reverse(),barWidth:18,itemStyle:{borderRadius:[0,4,4,0],color:'#2d5a8f'}}],grid:{left:90,right:20,top:40,bottom:10}});

  // 时段分布（报告页）
  if(!charts.reportHourly)charts.reportHourly=echarts.init(document.getElementById('chart-report-hourly'));
  var hd=r.hourly_distribution||[];
  charts.reportHourly.setOption({title:{text:'咨询时段分布',left:'center',textStyle:{fontSize:14}},tooltip:{},xAxis:{type:'category',data:hd.map(function(h){return h.hour;}),axisLabel:{fontSize:10}},yAxis:{type:'value',name:'咨询量'},series:[{type:'bar',data:hd.map(function(h){return h.count;}),barWidth:'60%',itemStyle:{borderRadius:[4,4,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#667eea'},{offset:1,color:'#764ba2'}])}}],grid:{left:45,right:15,top:45,bottom:30}});

  // 主题分布（报告页）
  if(!charts.reportTopic)charts.reportTopic=echarts.init(document.getElementById('chart-report-topic'));
  var tp=r.topic_breakdown||[];
  charts.reportTopic.setOption({title:{text:'关注主题分布',left:'center',textStyle:{fontSize:14}},tooltip:{trigger:'item',formatter:'{b}: {c}次 ({d}%)'},series:[{type:'pie',radius:['40%','70%'],center:['50%','55%'],data:tp.map(function(t){return{name:t.topic,value:t.count};}),label:{fontSize:11,formatter:'{b}\n{d}%'},emphasis:{label:{fontSize:14,fontWeight:'bold'}}}]});

  // 建议
  document.getElementById('suggestions').innerHTML=(r.suggestions||[]).map(function(s,i){
    return '<div style="padding:10px 14px;margin-bottom:6px;border-radius:6px;background:'+(i===0?'#fff3e0':i===1?'#e8f5e9':'#e3f2fd')+';border-left:3px solid '+(i===0?'#ff9800':i===1?'#4caf50':'#2196f3')+';font-size:13px">💡 '+s+'</div>';
  }).join('')||'<span style="color:#888">暂无建议</span>';
}

loadDashboard();
window.addEventListener("DOMContentLoaded",()=>{if(!avSid)avConnect();});
</script>
</body>
