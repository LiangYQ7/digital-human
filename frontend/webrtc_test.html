<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>WebRTC 测试</title></head>
<body>
<video id="v" autoplay playsinline muted style="width:100%;max-width:600px;background:#000"></video>
<p id="status">等待连接...</p>
<script>
function info(msg) {
  document.getElementById('status').textContent = msg;
  console.log(msg);
}
info('开始连接 WebRTC...');

const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.freeswitch.org:3478'}]});
pc.addTransceiver('video',{direction:'recvonly'});
pc.addTransceiver('audio',{direction:'recvonly'});

pc.addEventListener('track', e => {
  if(e.track.kind==='video') document.getElementById('v').srcObject = e.streams[0];
});

pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
  return new Promise(r => {
    if(pc.iceGatheringState==='complete') r();
    else pc.addEventListener('icegatheringstatechange', () => { if(pc.iceGatheringState==='complete') r(); });
  });
}).then(() => {
  info('发送 offer 到 LiveTalking...');
  return fetch('/lt/offer', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({sdp:pc.localDescription.sdp, type:pc.localDescription.type})
  });
}).then(r => r.json()).then(answer => {
  if(answer.sdp) {
    info('收到 answer! sessionid=' + answer.sessionid);
    return pc.setRemoteDescription(new RTCSessionDescription({type:'answer', sdp:answer.sdp}));
  } else {
    throw new Error('无 SDP: ' + JSON.stringify(answer));
  }
}).then(() => {
  info('连接成功!');
}).catch(e => {
  info('连接失败: ' + e.message);
  console.error(e);
});
window.addEventListener("beforeunload", () => { if(pc) { pc.close(); pc = null; } });
</script>
</body>
</html>
